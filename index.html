<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalat Night Street POS & Admin</title>
    <meta name="theme-color" content="#ffd700">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 950px; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .nav-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 950px; }
        .tab-btn { padding: 12px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #2a2a2a; color: #888; }
        .tab-btn.active { background: #ffd700; color: #111; }
        .view-panel { display: none; }
        .view-panel.active { display: block; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-item { background: #252525; color: white; border: 1px solid #3c3c3c; padding: 12px 10px; font-size: 13px; font-weight: bold; border-radius: 10px; cursor: pointer; text-align: left; }
        .btn-item:hover { background: #ffd700; color: #111; }
        .price { color: #ffd700; font-weight: normal; margin-top: 5px; display: block; }
        .section-title { color: #ff9900; font-size: 17px; margin: 25px 0 10px 0; border-bottom: 2px solid #333; padding-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        .category-title { color: #ffd700; font-size: 13px; margin: 15px 0 8px 0; padding: 5px; border-left: 3px solid #ffd700; text-transform: uppercase; font-weight: bold; background: rgba(255, 215, 0, 0.05); }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button id="tab-user" class="tab-btn active" onclick="switchMode('user')">🛒 Guna / Ambil Order</button>
    <button id="tab-admin" class="tab-btn" onclick="switchMode('admin')">👑 Monitor Admin</button>
</div>

<div class="app-container">
    <div id="panel-user" class="view-panel active">
        <div class="section-title">🥤 KTS Padu (Kopi Tenom)</div>
        
        <div class="category-title">Pilihan Panas</div>
        <div class="menu-grid">
            <button class="btn-item" onclick="addToCart('Kopi O Panas', 3.00)">Kopi O Panas <span class="price">RM 3.00</span></button>
            <button class="btn-item" onclick="addToCart('Kopi Panas', 3.00)">Kopi Panas <span class="price">RM 3.00</span></button>
            <button class="btn-item" onclick="addToCart('Teh C Panas', 3.00)">Teh C Panas <span class="price">RM 3.00</span></button>
            <button class="btn-item" onclick="addToCart('Teh O Panas', 3.00)">Teh O Panas <span class="price">RM 3.00</span></button>
            <button class="btn-item" onclick="addToCart('Milo Panas', 3.00)">Milo Panas <span class="price">RM 3.00</span></button>
            <button class="btn-item" onclick="addToCart('Neslo Panas', 3.00)">Neslo Panas <span class="price">RM 3.00</span></button>
            <button class="btn-item" onclick="addToCart('Alicafe Panas', 3.00)">Alicafe Panas <span class="price">RM 3.00</span></button>
        </div>
        
        <div class="category-title">Pilihan Sejuk (Ais)</div>
        <div class="menu-grid">
            <button class="btn-item" onclick="addToCart('Kopi O Ais', 3.50)">Kopi O Ais <span class="price">RM 3.50</span></button>
            <button class="btn-item" onclick="addToCart('Kopi Ais', 4.00)">Kopi Ais <span class="price">RM 4.00</span></button>
            <button class="btn-item" onclick="addToCart('Teh O Ais', 3.50)">Teh O Ais <span class="price">RM 3.50</span></button>
            <button class="btn-item" onclick="addToCart('Teh C Ais', 4.00)">Teh C Ais <span class="price">RM 4.00</span></button>
            <button class="btn-item" onclick="addToCart('Milo Ais', 4.00)">Milo Ais <span class="price">RM 4.00</span></button>
            <button class="btn-item" onclick="addToCart('Milo Ais Tabur', 4.50)">Milo Ais Tabur <span class="price">RM 4.50</span></button>
            <button class="btn-item" onclick="addToCart('Neslo Ais', 4.50)">Neslo Ais <span class="price">RM 4.50</span></button>
            <button class="btn-item" onclick="addToCart('Alicafe Ais', 4.00)">Alicafe Ais <span class="price">RM 4.00</span></button>
            <button class="btn-item" onclick="addToCart('Sirap Bandung Ais', 3.50)">Sirap Bandung Ais <span class="price">RM 3.50</span></button>
        </div>
        </div>
</div>

<script>
    // Pastikan anda tampal fungsi JavaScript (addToCart, switchMode, dll) 
    // dari kod penuh yang saya beri sebelum ini di sini.
</script>

</body>
</html>
