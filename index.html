<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Dalat Night Street POS</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .app-container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-item { background: #252525; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; cursor: pointer; }
        .btn-item:hover { background: #ffd700; color: #000; }
        .section-title { color: #ffd700; margin: 20px 0 10px; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Menu Minuman</h2>
    
    <div class="section-title">Pilihan Panas</div>
    <div class="menu-grid">
        <button class="btn-item" onclick="alert('Ditambah: Kopi O Panas')">Kopi O Panas (RM 3)</button>
        <button class="btn-item" onclick="alert('Ditambah: Kopi Panas')">Kopi Panas (RM 3)</button>
        <button class="btn-item" onclick="alert('Ditambah: Teh C Panas')">Teh C Panas (RM 3)</button>
        <button class="btn-item" onclick="alert('Ditambah: Teh O Panas')">Teh O Panas (RM 3)</button>
        <button class="btn-item" onclick="alert('Ditambah: Milo Panas')">Milo Panas (RM 3)</button>
        <button class="btn-item" onclick="alert('Ditambah: Alicafe Panas')">Alicafe Panas (RM 3)</button>
        <button class="btn-item" onclick="alert('Ditambah: Neslo Panas')">Neslo Panas (RM 3)</button>
    </div>

    <div class="section-title">Pilihan Sejuk (Ais)</div>
    <div class="menu-grid">
        <button class="btn-item" onclick="alert('Ditambah: Kopi O Ais')">Kopi O Ais (RM 3.5)</button>
        <button class="btn-item" onclick="alert('Ditambah: Kopi Ais')">Kopi Ais (RM 4)</button>
        <button class="btn-item" onclick="alert('Ditambah: Teh O Ais')">Teh O Ais (RM 3.5)</button>
        <button class="btn-item" onclick="alert('Ditambah: Teh C Ais')">Teh C Ais (RM 4)</button>
        <button class="btn-item" onclick="alert('Ditambah: Milo Ais')">Milo Ais (RM 4)</button>
        <button class="btn-item" onclick="alert('Ditambah: Milo Ais Tabur')">Milo Ais Tabur (RM 4.5)</button>
        <button class="btn-item" onclick="alert('Ditambah: Neslo Ais')">Neslo Ais (RM 4.5)</button>
        <button class="btn-item" onclick="alert('Ditambah: Alicafe Ais')">Alicafe Ais (RM 4)</button>
        <button class="btn-item" onclick="alert('Ditambah: Sirap Bandung Ais')">Sirap Bandung Ais (RM 3.5)</button>
    </div>
</div>

</body>
</html>
